{% extends 'base.html' %}
{% block title %}Reports{% endblock %}
{% block navbar_title %}Reports{% endblock %}
{% block content %}
<div class="page-header">
  <h1><i class="bi bi-bar-chart-line me-2 text-gold"></i>Reports</h1>
</div>

<div class="row g-3">
  <div class="col-6 col-sm-4 col-md-3 col-lg-2">
    <a href="{% url 'reports:sales' %}" class="dash-action-btn">
      <i class="bi bi-receipt"></i>
      <span>Sales Report</span>
    </a>
  </div>
  <div class="col-6 col-sm-4 col-md-3 col-lg-2">
    <a href="{% url 'reports:stock' %}" class="dash-action-btn">
      <i class="bi bi-box-seam"></i>
      <span>Stock Report</span>
    </a>
  </div>
  <div class="col-6 col-sm-4 col-md-3 col-lg-2">
    <a href="{% url 'reports:customer_credit' %}" class="dash-action-btn">
      <i class="bi bi-people"></i>
      <span>Customer Credit</span>
    </a>
  </div>
  <div class="col-6 col-sm-4 col-md-3 col-lg-2">
    <a href="{% url 'reports:supplier_payable' %}" class="dash-action-btn">
      <i class="bi bi-building"></i>
      <span>Supplier Payable</span>
    </a>
  </div>
  <div class="col-6 col-sm-4 col-md-3 col-lg-2">
    <a href="{% url 'reports:expenses' %}" class="dash-action-btn">
      <i class="bi bi-cash-coin"></i>
      <span>Expense Report</span>
    </a>
  </div>
  <div class="col-6 col-sm-4 col-md-3 col-lg-2">
    <a href="{% url 'reports:wastage' %}" class="dash-action-btn">
      <i class="bi bi-trash3"></i>
      <span>Wastage Report</span>
    </a>
  </div>
  {% if user.is_staff %}
  <div class="col-6 col-sm-4 col-md-3 col-lg-2">
    <a href="{% url 'reports:profit_loss' %}" class="dash-action-btn" style="border-color:var(--accent-gold);color:var(--accent-gold);">
      <i class="bi bi-graph-up-arrow"></i>
      <span>Profit &amp; Loss</span>
    </a>
  </div>
  {% endif %}
</div>
{% endblock %}
